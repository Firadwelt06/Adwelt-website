<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adwelt Enterprises | Data & Analytics Consultancy</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        const { 
            Database, BarChart, Cpu, Search, Workflow, MessageCircle, 
            Mail, Globe, CheckCircle2, Quote, ExternalLink, ChevronRight, Menu, X 
        } = lucide;

        const App = () => {
            const [isMenuOpen, setIsMenuOpen] = useState(false);
            const [scrolled, setScrolled] = useState(false);

            useEffect(() => {
                const handleScroll = () => setScrolled(window.scrollY > 20);
                window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            const closeMenu = () => setIsMenuOpen(false);

            const services = [
                { title: "Database Admin & Management", desc: "Robust architecture and maintenance for your mission-critical data systems.", icon: <Database className="w-6 h-6" /> },
                { title: "Data Analysis & Reporting", desc: "Transforming raw numbers into actionable business intelligence and insights.", icon: <BarChart className="w-6 h-6" /> },
                { title: "Workflow Automation", desc: "Eliminating manual bottlenecks through intelligent digital sequences.", icon: <Cpu className="w-6 h-6" /> },
                { title: "Process Optimization", desc: "Streamlining operations to maximize efficiency and reduce overhead costs.", icon: <Workflow className="w-6 h-6" /> },
                { title: "Problem Diagnosis", desc: "Identifying root causes of business friction and engineering custom fixes.", icon: <Search className="w-6 h-6" /> }
            ];

            const whatsappLink = "https://wa.me/2349048774929";

            return (
                <div className="min-h-screen bg-[#F8FAFC]">
                    {/* Navigation */}
                    <nav className={`fixed w-full z-50 transition-all duration-300 ${scrolled || isMenuOpen ? 'bg-white shadow-sm py-3' : 'bg-transparent py-6'}`}>
                        <div className="container mx-auto px-6 flex justify-between items-center">
                            <div className="flex items-center space-x-2 relative z-50">
                                <div className="w-10 h-10 bg-indigo-600 rounded-lg flex items-center justify-center shadow-lg">
                                    <Database className="text-white w-6 h-6" />
                                </div>
                                <span className="text-xl font-bold text-slate-900 uppercase tracking-tighter">Adwelt<span className="text-indigo-600">Enterprises</span></span>
                            </div>
                            
                            <div className="hidden md:flex items-center space-x-8">
                                <a href="#services" className="text-sm font-semibold hover:text-indigo-600">Services</a>
                                <a href="#portfolio" className="text-sm font-semibold hover:text-indigo-600">Past Work</a>
                                <a href="#contact" className="text-sm font-semibold hover:text-indigo-600">Contact</a>
                                <a href={whatsappLink} className="bg-indigo-600 text-white px-5 py-2.5 rounded-full text-sm font-bold flex items-center gap-2">
                                    <MessageCircle className="w-4 h-4" /> Consult Now
                                </a>
                            </div>

                            <button className="md:hidden p-2 relative z-50" onClick={() => setIsMenuOpen(!isMenuOpen)}>
                                {isMenuOpen ? <X /> : <Menu />}
                            </button>
                        </div>

                        {/* Mobile Menu */}
                        <div className={`md:hidden absolute top-0 left-0 w-full bg-white shadow-2xl transition-all ${isMenuOpen ? 'translate-y-0 opacity-100' : '-translate-y-full opacity-0 pointer-events-none'}`}>
                            <div className="pt-24 pb-12 px-6 flex flex-col space-y-6">
                                <a href="#services" onClick={closeMenu} className="text-xl font-bold">Services</a>
                                <a href="#portfolio" onClick={closeMenu} className="text-xl font-bold">Past Work</a>
                                <a href="#contact" onClick={closeMenu} className="text-xl font-bold">Contact</a>
                                <a href={whatsappLink} className="bg-indigo-600 text-white p-4 rounded-xl font-bold text-center">WhatsApp Us</a>
                            </div>
                        </div>
                    </nav>

                    {/* Hero */}
                    <section className="pt-32 pb-20 lg:pt-48 lg:pb-32 text-center px-6">
                        <div className="inline-block bg-indigo-50 text-indigo-700 px-4 py-1.5 rounded-full text-xs font-bold uppercase mb-8 tracking-widest">Available Worldwide</div>
                        <h1 className="text-4xl lg:text-7xl font-black mb-8 leading-tight">Data Solutions for <br/><span className="text-indigo-600">Predictable Growth.</span></h1>
                        <p className="text-lg text-slate-600 mb-12 max-w-2xl mx-auto">Adwelt Enterprises specializes in database management, automation, and custom data solutions.</p>
                        <div className="flex flex-col sm:flex-row justify-center gap-4">
                            <a href="#contact" className="bg-slate-900 text-white px-10 py-4 rounded-xl font-bold shadow-xl">Start a Project</a>
                            <a href={whatsappLink} className="bg-white border border-slate-200 px-10 py-4 rounded-xl font-bold flex items-center justify-center gap-2">
                                <MessageCircle className="w-5 h-5 text-green-500" /> WhatsApp
                            </a>
                        </div>
                    </section>

                    {/* Services */}
                    <section id="services" className="py-24 bg-white px-6">
                        <div className="container mx-auto grid md:grid-cols-2 lg:grid-cols-3 gap-8">
                            {services.map((s, i) => (
                                <div key={i} className="p-8 rounded-3xl bg-slate-50 border border-slate-100 hover:shadow-xl transition-all group">
                                    <div className="w-12 h-12 bg-white rounded-xl flex items-center justify-center mb-6 text-indigo-600 group-hover:bg-indigo-600 group-hover:text-white transition-all">
                                        {s.icon}
                                    </div>
                                    <h4 className="text-xl font-bold mb-3">{s.title}</h4>
                                    <p className="text-slate-600 leading-relaxed">{s.desc}</p>
                                </div>
                            ))}
                        </div>
                    </section>

                    {/* Portfolio */}
                    <section id="portfolio" className="py-24 bg-indigo-900 text-white px-6">
                        <div className="container mx-auto max-w-4xl">
                            <h2 className="text-3xl font-bold mb-8">Past Work: Smart Result NG</h2>
                            <p className="text-indigo-100 text-xl mb-12 leading-relaxed">A school technology project delivering remote data management with 100% accuracy and automated result computation.</p>
                            <div className="grid md:grid-cols-2 gap-8">
                                <div className="bg-white/10 p-10 rounded-3xl border border-white/10 text-center">
                                    <p className="italic text-xl">"Good job done — results came out on time this term."</p>
                                </div>
                                <div className="bg-white/10 p-10 rounded-3xl border border-white/10 text-center">
                                    <p className="italic text-xl">"Such a brilliant mind behind our results."</p>
                                </div>
                            </div>
                        </div>
                    </section>

                    {/* Contact */}
                    <section id="contact" className="py-24 px-6 text-center">
                        <h2 className="text-4xl font-bold mb-12">Contact Adwelt Enterprises</h2>
                        <div className="flex flex-col items-center space-y-6">
                            <p className="text-xl font-bold">Email: adeleyebukola587@gmail.com</p>
                            <a href={whatsappLink} className="text-indigo-600 font-bold text-2xl">+234 904 877 4929</a>
                        </div>
                    </section>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
