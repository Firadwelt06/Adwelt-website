<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adwelt Enterprises | Data & Analytics</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; padding: 0; }
        #root { min-height: 100vh; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const App = () => {
            const [isMenuOpen, setIsMenuOpen] = useState(false);
            const [scrolled, setScrolled] = useState(false);

            useEffect(() => {
                const handleScroll = () => setScrolled(window.scrollY > 20);
                window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            // Icons from Lucide
            const Database = () => <i data-lucide="database"></i>;
            const BarChart = () => <i data-lucide="bar-chart"></i>;
            const MessageCircle = () => <i data-lucide="message-circle"></i>;
            const Mail = () => <i data-lucide="mail"></i>;
            const Globe = () => <i data-lucide="globe"></i>;
            const Menu = () => <i data-lucide="menu"></i>;
            const X = () => <i data-lucide="x"></i>;

            useEffect(() => {
                // This triggers Lucide to replace the <i> tags with icons
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            }, [isMenuOpen]);

            const whatsappLink = "https://wa.me/2349048774929";

            return (
                <div className="min-h-screen bg-[#F8FAFC]">
                    <nav className={`fixed w-full z-50 transition-all ${scrolled || isMenuOpen ? 'bg-white shadow-md py-3' : 'bg-transparent py-6'}`}>
                        <div className="container mx-auto px-6 flex justify-between items-center">
                            <div className="flex items-center space-x-2">
                                <div className="w-10 h-10 bg-indigo-600 rounded-lg flex items-center justify-center shadow-lg text-white">
                                    <i data-lucide="database" className="w-6 h-6"></i>
                                </div>
                                <span className="text-xl font-bold text-slate-900 uppercase tracking-tighter">Adwelt<span className="text-indigo-600">Enterprises</span></span>
                            </div>
                            <button className="md:hidden p-2" onClick={() => setIsMenuOpen(!isMenuOpen)}>
                                {isMenuOpen ? <i data-lucide="x"></i> : <i data-lucide="menu"></i>}
                            </button>
                        </div>
                        {isMenuOpen && (
                            <div className="bg-white p-6 flex flex-col space-y-4 shadow-xl">
                                <a href="#contact" onClick={() => setIsMenuOpen(false)} className="font-bold">Contact</a>
                                <a href={whatsappLink} className="bg-indigo-600 text-white p-3 rounded-lg text-center font-bold">WhatsApp Us</a>
                            </div>
                        )}
                    </nav>

                    <section className="pt-40 pb-20 text-center px-6">
                        <h1 className="text-4xl lg:text-7xl font-black mb-6 leading-tight">Data Solutions for <br/><span className="text-indigo-600">Predictable Growth.</span></h1>
                        <p className="text-lg text-slate-600 mb-8 max-w-2xl mx-auto">Adwelt Enterprises: Database management, automation, and custom data solutions.</p>
                        <div className="flex flex-col sm:flex-row justify-center gap-4">
                            <a href={whatsappLink} className="bg-indigo-600 text-white px-10 py-4 rounded-xl font-bold shadow-lg">WhatsApp Consultation</a>
                            <a href="mailto:adeleyebukola587@gmail.com" className="bg-white border border-slate-200 px-10 py-4 rounded-xl font-bold italic">Email Us</a>
                        </div>
                    </section>

                    <section className="py-20 bg-indigo-900 text-white text-center px-6">
                        <h2 className="text-2xl font-bold mb-4">Smart Result NG Project</h2>
                        <p className="max-w-xl mx-auto opacity-80 italic">"Good job done — results came out on time this term."</p>
                    </section>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
