<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adwelt Enterprises | Data & Analytics</title>
    <!-- Core Libraries -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            margin: 0; 
            padding: 0; 
            background-color: #F8FAFC;
        }
        #root { min-height: 100vh; }
        /* Smooth scrolling for anchor links */
        html { scroll-behavior: smooth; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const App = () => {
            const [isMenuOpen, setIsMenuOpen] = useState(false);
            const [scrolled, setScrolled] = useState(false);
            const [formData, setFormData] = useState({
                name: '',
                email: '',
                projectType: 'Database Management',
                challenge: ''
            });
            const [isSubmitting, setIsSubmitting] = useState(false);

            // This effect handles the scroll shadow on nav and replaces icons
            useEffect(() => {
                const handleScroll = () => setScrolled(window.scrollY > 20);
                window.addEventListener('scroll', handleScroll);
                
                // Initial icon replacement
                if (window.lucide) {
                    window.lucide.createIcons();
                }
                
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            // Re-run Lucide whenever the menu opens or scrolls to ensure icons are drawn
            useEffect(() => {
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            }, [isMenuOpen, scrolled]);

            const closeMenu = () => setIsMenuOpen(false);
            const whatsappLink = "https://wa.me/2349048774929";

            const handleFormChange = (e) => {
                const { name, value } = e.target;
                setFormData(prev => ({
                    ...prev,
                    [name]: value
                }));
            };

            const handleFormSubmit = async (e) => {
                e.preventDefault();
                setIsSubmitting(true);
                try {
                    const response = await fetch('https://formsubmit.co/adeleyebukola587@gmail.com', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify({
                            name: formData.name,
                            email: formData.email,
                            projectType: formData.projectType,
                            challenge: formData.challenge,
                            '_subject': `New Inquiry from ${formData.name}`
                        })
                    });
                    
                    if (response.ok) {
                        alert('Your inquiry has been sent successfully! We will get back to you soon.');
                        setFormData({ name: '', email: '', projectType: 'Database Management', challenge: '' });
                    } else {
                        alert('There was an issue sending your inquiry. Please try again.');
                    }
                } catch (error) {
                    alert('There was an error. Please try again or contact us directly via WhatsApp.');
                } finally {
                    setIsSubmitting(false);
                }
            };

            const services = [
                {
                    title: "Database Admin & Management",
                    desc: "Robust architecture and maintenance for your mission-critical data systems.",
                    icon: "database"
                },
                {
                    title: "Data Analysis & Reporting",
                    desc: "Transforming raw numbers into actionable business intelligence and insights.",
                    icon: "bar-chart"
                },
                {
                    title: "Workflow Automation",
                    desc: "Eliminating manual bottlenecks through intelligent digital sequences.",
                    icon: "cpu"
                },
                {
                    title: "Process Optimization",
                    desc: "Streamlining operations to maximize efficiency and reduce overhead costs.",
                    icon: "workflow"
                },
                {
                    title: "Problem Diagnosis",
                    desc: "Identifying root causes of business friction and engineering custom fixes.",
                    icon: "search"
                }
            ];

            const testimonials = [
                {
                    quote: "Good job done — results came out on time this term.",
                    author: "School Administrator",
                    context: "Result Management System"
                },
                {
                    quote: "Such a brilliant mind behind our results.",
                    author: "Project Stakeholder",
                    context: "Data Processing"
                }
            ];

            return (
                <div className="min-h-screen font-sans text-slate-900 selection:bg-indigo-100 selection:text-indigo-700">

                    <nav className={`fixed w-full z-50 transition-all duration-300 ${scrolled || isMenuOpen ? 'bg-white shadow-sm py-3' : 'bg-transparent py-6'}`}>

                            <div className="flex items-center space-x-2 relative z-50">
                                <div className="w-10 h-10 bg-indigo-600 rounded-lg flex items-center justify-center shadow-indigo-200 shadow-lg">
                                    <i data-lucide="database" className="text-white w-6 h-6"></i>
                                </div>
                                <span className="text-xl md:text-2xl font-bold tracking-tight text-slate-900">
                                    ADWELT<span className="text-indigo-600 underline decoration-indigo-200 decoration-4 underline-offset-4">ENTERPRISES</span>

                            </div>
                            
                            {/* Desktop Links */}

                                <a href="#portfolio" className="text-sm font-semibold hover:text-indigo-600 transition-colors">Past Work</a>
                                <a href="#contact" className="text-sm font-semibold hover:text-indigo-600 transition-colors">Contact</a>
                                <a href={whatsappLink} target="_blank" rel="noreferrer" className="bg-indigo-600 text-white px-5 py-2.5 rounded-full text-sm font-bold hover:bg-indigo-700 transition-all shadow-md flex items-center gap-2">
                                    <i data-lucide="message-circle" className="w-4 h-4"></i> Consult Now
                                </a>
                            </div>

                            {/* Mobile Toggle Button */}

                                onClick={() => setIsMenuOpen(!isMenuOpen)}

                            </button>
                        </div>

                        {/* Mobile Menu Dropdown */}
                        <div className={`md:hidden absolute top-0 left-0 w-full bg-white shadow-2xl transition-all duration-300 ease-in-out transform ${isMenuOpen ? 'translate-y-0 opacity-100' : '-translate-y-full opacity-0 pointer-events-none'}`}>
                            <div className="pt-24 pb-12 px-6 flex flex-col space-y-6">
                                <a href="#services" onClick={closeMenu} className="text-xl font-bold text-slate-800 border-b border-slate-100 pb-4">Services</a>
                                <a href="#portfolio" onClick={closeMenu} className="text-xl font-bold text-slate-800 border-b border-slate-100 pb-4">Past Work</a>
                                <a href="#contact" onClick={closeMenu} className="text-xl font-bold text-slate-800 border-b border-slate-100 pb-4">Contact</a>
                                <a 
                                    href={whatsappLink} 
                                    target="_blank" 
                                    rel="noreferrer" 
                                    className="bg-indigo-600 text-white p-4 rounded-xl font-bold text-center shadow-lg flex items-center justify-center gap-2"
                                >
                                    <i data-lucide="message-circle" className="w-5 h-5"></i> WhatsApp Consultation
                                </a>
                            </div>
                        </div>
                    </nav>

                    {/* Hero Section */}
                    <section className="pt-32 pb-20 lg:pt-48 lg:pb-32 relative overflow-hidden">
                        <div className="absolute top-0 left-1/2 -translate-x-1/2 w-full h-full -z-10 opacity-40">
                            <div className="absolute top-0 left-1/4 w-96 h-96 bg-indigo-200 rounded-full blur-[120px]"></div>
                            <div className="absolute bottom-0 right-1/4 w-96 h-96 bg-blue-100 rounded-full blur-[120px]"></div>
                        </div>

                        <div className="container mx-auto px-6 text-center">
                            <div className="inline-flex items-center gap-2 bg-indigo-50 border border-indigo-100 text-indigo-700 px-4 py-1.5 rounded-full text-xs font-bold uppercase tracking-wider mb-8">
                                <i data-lucide="globe" className="w-3 h-3"></i> Available Worldwide • Remote Expert
                            </div>
                            <h1 className="text-4xl lg:text-7xl font-black text-slate-900 mb-8 tracking-tight leading-tight">
                                Turning Raw Data Into <br className="hidden lg:block"/>

                                <div className="max-w-2xl">

                            </div>

                            <div className="grid md:grid-cols-2 lg:grid-cols-3 gap-8">
                                {services.map((s, i) => (
                                    <div key={i} className="p-8 rounded-3xl bg-[#F8FAFC] border border-slate-100 hover:border-indigo-200 hover:bg-white hover:shadow-xl hover:shadow-indigo-50 transition-all group">
                                        <div className="w-12 h-12 bg-white rounded-xl shadow-sm flex items-center justify-center mb-6 text-indigo-600 group-hover:bg-indigo-600 group-hover:text-white transition-all">
                                            <i data-lucide={s.icon} className="w-6 h-6"></i>
                                        </div>
                                        <h4 className="text-xl font-bold mb-3">{s.title}</h4>
                                        <p className="text-slate-600 leading-relaxed">{s.desc}</p>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </section>

                    {/* Portfolio Highlight */}
                    <section id="portfolio" className="py-24 bg-indigo-900 text-white overflow-hidden relative">
                        <div className="container mx-auto px-6 relative z-10">
                            <div className="grid lg:grid-cols-2 gap-16 items-center">
                                <div>
                                    <div className="inline-block px-4 py-1 bg-indigo-500/30 rounded-full text-indigo-200 text-xs font-bold uppercase mb-6 tracking-widest">Featured Case Study</div>
                                    <h2 className="text-4xl lg:text-5xl font-bold mb-8 tracking-tight">Smart Result NG</h2>
                                    <p className="text-indigo-100 text-xl leading-relaxed mb-8">
                                        A large-scale school technology project focused on delivering seamless remote data management. We implemented a robust system to handle complex academic results with precision and speed.
                                    </p>
                                    <div className="space-y-4 mb-10 text-indigo-100">
                                        <div className="flex items-center gap-3">
                                            <i data-lucide="check-circle-2" className="text-indigo-400 w-5 h-5"></i>
                                            <span>Remote Data Infrastructure</span>
                                        </div>
                                        <div className="flex items-center gap-3">
                                            <i data-lucide="check-circle-2" className="text-indigo-400 w-5 h-5"></i>
                                            <span>Automated Result Computation</span>
                                        </div>
                                        <div className="flex items-center gap-3">
                                            <i data-lucide="check-circle-2" className="text-indigo-400 w-5 h-5"></i>
                                            <span>Real-time Reporting Dashboards</span>
                                        </div>
                                    </div>
                                </div>
                                <div className="relative">
                                    <div className="bg-white/5 backdrop-blur-xl border border-white/10 rounded-[32px] p-8 shadow-2xl">
                                        <div className="flex items-center justify-between mb-8">
                                            <div className="space-y-1">
                                                <div className="text-xs text-indigo-300 font-bold uppercase tracking-wider">Project Metric</div>
                                                <div className="text-3xl font-bold tracking-tighter">100% Accuracy</div>
                                            </div>
                                            <i data-lucide="external-link" className="text-indigo-400 w-6 h-6"></i>
                                        </div>
                                        <div className="space-y-4">
                                            <div className="h-2 w-full bg-white/10 rounded-full overflow-hidden">
                                                <div className="h-full w-[95%] bg-indigo-500"></div>
                                            </div>
                                            <div className="flex justify-between text-xs font-medium text-indigo-300">
                                                <span>DATA PROCESSING SPEED</span>
                                                <span>OPTIMIZED</span>
                                            </div>
                                        </div>
                                        <div className="mt-12 grid grid-cols-2 gap-4">
                                            <div className="bg-white/5 p-4 rounded-2xl">
                                                <div className="text-2xl font-bold">24/7</div>
                                                <div className="text-xs text-indigo-300">Remote Access</div>
                                            </div>
                                            <div className="bg-white/5 p-4 rounded-2xl">
                                                <div className="text-2xl font-bold">Instant</div>
                                                <div className="text-xs text-indigo-300">Report Gen</div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </section>

                    {/* Testimonials */}
                    <section className="py-24 bg-white">
                        <div className="container mx-auto px-6">
                            <div className="text-center mb-16">
                                <h3 className="text-3xl font-bold tracking-tight">Trusted by Clients</h3>
                            </div>
                            <div className="grid md:grid-cols-2 gap-8 max-w-4xl mx-auto">
                                {testimonials.map((t, i) => (
                                    <div key={i} className="p-10 rounded-[40px] bg-[#F8FAFC] border border-slate-50 relative group">
                                        <div className="absolute top-6 right-8 text-indigo-100 group-hover:text-indigo-200 transition-colors opacity-50">
                                            <i data-lucide="quote" className="w-12 h-12"></i>
                                        </div>
                                        <p className="text-xl italic text-slate-700 mb-6 relative z-10 leading-relaxed">"{t.quote}"</p>
                                        <div className="flex items-center gap-4">
                                            <div className="w-10 h-10 bg-indigo-600 rounded-full flex items-center justify-center text-white text-xs font-bold uppercase">
                                                {t.author.charAt(0)}
                                            </div>
                                            <div>
                                                <div className="font-bold text-slate-900">{t.author}</div>
                                                <div className="text-sm text-slate-500">{t.context}</div>
                                            </div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </section>

                    {/* Final Contact Section */}
                    <section id="contact" className="py-24 bg-slate-50 border-t border-slate-100">
                        <div className="container mx-auto px-6">
                            <div className="bg-white rounded-[48px] p-8 lg:p-20 shadow-xl border border-slate-100 overflow-hidden relative">
                                <div className="absolute -bottom-20 -right-20 w-80 h-80 bg-indigo-50 rounded-full blur-[80px]"></div>
                                
                                <div className="grid lg:grid-cols-2 gap-16 relative z-10">
                                    <div>
                                        <h2 className="text-3xl lg:text-5xl font-bold mb-8 tracking-tight text-slate-900">Let's solve your data problems.</h2>
                                        <p className="text-slate-600 text-lg lg:text-xl mb-12 max-w-md">
                                            Ready to automate your workflow or secure your database? We are available for projects worldwide.
                                        </p>
                                        
                                        <div className="space-y-8">
                                            <a href={whatsappLink} target="_blank" rel="noreferrer" className="flex items-center gap-6 group">
                                                <div className="w-14 h-14 bg-green-50 rounded-2xl flex items-center justify-center text-green-600 group-hover:bg-green-600 group-hover:text-white transition-all">
                                                    <i data-lucide="message-circle" className="w-7 h-7"></i>
                                                </div>
                                                <div className="flex-1">
                                                    <div className="text-xs font-bold text-slate-400 uppercase tracking-widest">WhatsApp Business</div>
                                                    <div className="text-lg lg:text-xl font-bold text-slate-900">+234 904 877 4929</div>
                                                </div>
                                            </a>
                                            <a href="mailto:adeleyebukola587@gmail.com" className="flex items-center gap-6 group">
                                                <div className="w-14 h-14 bg-indigo-50 rounded-2xl flex items-center justify-center text-indigo-600 group-hover:bg-indigo-600 group-hover:text-white transition-all">
                                                    <i data-lucide="mail" className="w-7 h-7"></i>
                                                </div>
                                                <div className="flex-1">
                                                    <div className="text-xs font-bold text-slate-400 uppercase tracking-widest">Direct Email</div>
                                                    <div className="text-lg lg:text-xl font-bold text-slate-900 break-all">adeleyebukola587@gmail.com</div>
                                                </div>
                                            </a>
                                            <div className="flex items-center gap-6">
                                                <div className="w-14 h-14 bg-blue-50 rounded-2xl flex items-center justify-center text-blue-600">
                                                    <i data-lucide="globe" className="w-7 h-7"></i>
                                                </div>

                                                <label className="text-sm font-bold text-slate-700">Your Full Name</label>
                                                <input 
                                                    name="name"
                                                    value={formData.name}

                                                    className="w-full bg-white border border-slate-200 rounded-xl p-4 outline-none focus:ring-2 focus:ring-indigo-500"

                                                <input 
                                                    name="email"
                                                    type="email"
                                                    value={formData.email}
                                                    onChange={handleFormChange}
                                                    required
                                                    className="w-full bg-white border border-slate-200 rounded-xl p-4 outline-none focus:ring-2 focus:ring-indigo-500"

                                                <select
